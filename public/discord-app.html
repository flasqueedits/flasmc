<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flasmc Discord Bot</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d0d10;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.app{width:480px;max-width:95vw;padding:32px}
.logo{text-align:center;margin-bottom:28px}
.logo span{font-size:36px}
.logo h1{font-size:22px;font-weight:700;margin-top:8px;background:linear-gradient(135deg,#6c63ff,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{font-size:13px;color:#888;margin-top:4px}
.card{background:#19191f;border:1px solid #2a2a35;border-radius:16px;padding:24px;margin-bottom:16px}
.card h2{font-size:15px;color:#aaa;margin-bottom:14px;text-transform:uppercase;letter-spacing:.5px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 14px;background:#0d0d10;border:1px solid #2a2a35;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus{border-color:#6c63ff}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary{background:#6c63ff;color:#fff}
.btn-primary:hover{background:#7b73ff}
.btn-danger{background:#ff4757;color:#fff}
.btn-danger:hover{background:#ff6b7a}
.btn-secondary{background:#2a2a35;color:#e0e0e0}
.btn-secondary:hover{background:#3a3a45}
.btn-full{width:100%;justify-content:center}
.status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.status-dot.on{background:#2ed573;box-shadow:0 0 8px #2ed57380}
.status-dot.off{background:#ff4757;box-shadow:0 0 8px #ff475780}
.status-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #2a2a35}
.status-row:last-child{border-bottom:none}
.status-label{font-size:13px;color:#aaa;flex:1}
.status-value{font-size:14px;font-weight:600}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#19191f;border:1px solid #2a2a35;padding:12px 24px;border-radius:10px;font-size:13px;color:#e0e0e0;z-index:100;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>
<div class="app">
  <div class="logo">
    <span>🤖</span>
    <h1>Flasmc Discord Bot</h1>
    <p>Standalone bot manager</p>
  </div>

  <div class="card">
    <h2>Status</h2>
    <div id="status-area">
      <div class="status-row"><span class="status-label">Bot</span><span class="status-value" id="s-bot"><span class="status-dot off"></span>Disconnected</span></div>
      <div class="status-row"><span class="status-label">Prefix</span><span class="status-value" id="s-prefix">!</span></div>
    </div>
  </div>

  <div class="card">
    <h2>Configuration</h2>
    <div class="form-group">
      <label>Bot Token</label>
      <input type="password" id="cfg-token" placeholder="Enter Discord bot token...">
    </div>
    <div class="form-group">
      <label>Prefix</label>
      <input type="text" id="cfg-prefix" placeholder="!" maxlength="5">
    </div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-primary btn-full" id="btn-start"><i class="fas fa-play"></i> Start Bot</button>
      <button class="btn btn-danger btn-full hidden" id="btn-stop"><i class="fas fa-stop"></i> Stop</button>
    </div>
    <button class="btn btn-secondary btn-full" id="btn-save" style="margin-top:8px;"><i class="fas fa-save"></i> Save Config</button>
  </div>

  <div class="card" style="text-align:center;font-size:12px;color:#666;">
    <p>Requires the main Flasmc server to be running on port 3000 for full functionality.</p>
    <p style="margin-top:4px;">Run: <code style="background:#0d0d10;padding:2px 6px;border-radius:4px;">node discord-app.js</code></p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>
<script>
const API = '/api';

async function api(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(API + path, opts);
    return await resp.json();
  } catch { return { error: 'Request failed' }; }
}

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function loadStatus() {
  const data = await api('GET', '/status');
  document.getElementById('s-bot').innerHTML = data.connected
    ? `<span class="status-dot on"></span>Connected${data.botUser ? ' ('+data.botUser+')' : ''}`
    : '<span class="status-dot off"></span>Disconnected';
  document.getElementById('s-prefix').textContent = data.prefix || '!';
  document.getElementById('cfg-prefix').value = data.prefix || '!';
  document.getElementById('btn-start').classList.toggle('hidden', data.connected);
  document.getElementById('btn-stop').classList.toggle('hidden', !data.connected);
}

document.getElementById('btn-start').addEventListener('click', async () => {
  const token = document.getElementById('cfg-token').value.trim();
  if (!token) { toast('Enter bot token'); return; }
  const prefix = document.getElementById('cfg-prefix').value.trim() || '!';
  await api('POST', '/config', { action: 'start', token, prefix });
  toast('Starting bot...');
  setTimeout(loadStatus, 3000);
});

document.getElementById('btn-stop').addEventListener('click', async () => {
  await api('POST', '/config', { action: 'stop' });
  toast('Bot stopped');
  loadStatus();
});

document.getElementById('btn-save').addEventListener('click', async () => {
  const token = document.getElementById('cfg-token').value.trim();
  const prefix = document.getElementById('cfg-prefix').value.trim() || '!';
  await api('POST', '/config', { token, prefix });
  toast('Config saved');
});

loadStatus();
setInterval(loadStatus, 5000);
</script>
</body>
</html>
