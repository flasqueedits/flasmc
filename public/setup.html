<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flasmc — Setup</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex;
  align-items: center; justify-content: center;
  background-image: radial-gradient(ellipse at 30% 20%, #16213e 0%, #0f0f23 100%);
}
.setup-card {
  background: #1e1e3a; border: 1px solid #2a2a4a; border-radius: 20px;
  padding: 40px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.logo { text-align: center; margin-bottom: 32px; }
.logo i { font-size: 48px; color: #6c63ff; }
.logo h1 { font-size: 28px; margin-top: 12px; background: linear-gradient(135deg, #6c63ff, #ff6584); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo p { color: #888; font-size: 13px; margin-top: 4px; -webkit-text-fill-color: #888; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; font-weight: 500; }
.form-group input {
  width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid #2a2a4a;
  background: #16162e; color: #e0e0e0; font-size: 14px; outline: none; transition: border 0.2s;
}
.form-group input:focus { border-color: #6c63ff; }
.error-msg { font-size: 13px; color: #ff6584; margin-bottom: 16px; display: none; }
.btn-primary {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #6c63ff, #5a52d5); color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.9; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none; }
.steps { margin-bottom: 28px; }
.step { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
.step-num { width: 28px; height: 28px; border-radius: 50%; background: #2a2a4a; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #888; flex-shrink: 0; }
.step.done .step-num { background: #6c63ff; color: #fff; }
.step-text { font-size: 13px; color: #888; }
.step.done .step-text { color: #e0e0e0; }
.success-msg { text-align: center; padding: 20px 0; }
.success-msg i { font-size: 64px; color: #4caf7d; margin-bottom: 16px; }
.success-msg h2 { margin-bottom: 8px; }
.success-msg p { color: #888; font-size: 14px; margin-bottom: 20px; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="setup-card" id="setup-form">
  <div class="logo">
    <i class="fas fa-cubes"></i>
    <h1>Flasmc</h1>
    <p>Minecraft Server Manager</p>
  </div>
  <div class="steps">
    <div class="step done"><div class="step-num">1</div><div class="step-text">Welcome to Flasmc</div></div>
    <div class="step" id="step2"><div class="step-num">2</div><div class="step-text">Create admin account</div></div>
    <div class="step" id="step3"><div class="step-num">3</div><div class="step-text">Start managing servers</div></div>
  </div>
  <div class="form-group">
    <label><i class="fas fa-user" style="width:16px;color:#6c63ff;"></i> Username</label>
    <input type="text" id="setup-username" placeholder="admin" spellcheck="false" autocomplete="off">
  </div>
  <div class="form-group">
    <label><i class="fas fa-lock" style="width:16px;color:#6c63ff;"></i> Password</label>
    <input type="password" id="setup-password" placeholder="At least 4 characters" autocomplete="new-password">
  </div>
  <div class="form-group">
    <label><i class="fas fa-check-circle" style="width:16px;color:#6c63ff;"></i> Confirm Password</label>
    <input type="password" id="setup-password-confirm" placeholder="Repeat password" autocomplete="new-password">
  </div>
  <div class="error-msg" id="setup-error"></div>
  <button id="setup-btn" class="btn-primary"><i class="fas fa-rocket"></i> Create Account</button>
  <p style="text-align:center;margin-top:16px;font-size:12px;color:#555;">
    <i class="fas fa-shield-alt" style="margin-right:4px;"></i> Password is hashed with scrypt
  </p>
</div>
<div class="setup-card hidden" id="setup-success">
  <div class="success-msg">
    <i class="fas fa-check-circle"></i>
    <h2>Account Created!</h2>
    <p>Redirecting to login...</p>
    <button id="goto-login-btn" class="btn-primary"><i class="fas fa-sign-in-alt"></i> Go to Login</button>
  </div>
</div>
<script>
const API = '/api';
let needsSetup = true;

async function checkSetup() {
  try {
    const r = await fetch(API + '/auth/status');
    const d = await r.json();
    needsSetup = d.needsSetup;
    if (!needsSetup) {
      document.getElementById('setup-form').classList.add('hidden');
      document.getElementById('setup-success').classList.remove('hidden');
      document.getElementById('setup-success').querySelector('h2').textContent = 'Already Set Up!';
      document.getElementById('setup-success').querySelector('p').textContent = 'An admin account already exists. Go to login.';
    }
  } catch {}
}
checkSetup();

document.getElementById('setup-btn').addEventListener('click', async () => {
  const username = document.getElementById('setup-username').value.trim();
  const password = document.getElementById('setup-password').value;
  const confirm = document.getElementById('setup-password-confirm').value;
  const errEl = document.getElementById('setup-error');

  if (!username) { errEl.textContent = 'Enter a username'; errEl.style.display = 'block'; return; }
  if (password.length < 4) { errEl.textContent = 'Password must be at least 4 characters'; errEl.style.display = 'block'; return; }
  if (password !== confirm) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const btn = document.getElementById('setup-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Creating account...';

  try {
    const r = await fetch(API + '/auth/setup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (d.success) {
      localStorage.setItem('flasmc_token', d.token);
      document.getElementById('step2').classList.add('done');
      document.getElementById('step3').classList.add('done');
      document.getElementById('setup-form').classList.add('hidden');
      document.getElementById('setup-success').classList.remove('hidden');
      setTimeout(() => { window.location.href = '/'; }, 2000);
    } else {
      errEl.textContent = d.error || 'Setup failed';
      errEl.style.display = 'block';
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-rocket"></i> Create Account';
    }
  } catch (err) {
    errEl.textContent = 'Connection error: ' + err.message;
    errEl.style.display = 'block';
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-rocket"></i> Create Account';
  }
});

document.getElementById('goto-login-btn').addEventListener('click', () => {
  window.location.href = '/';
});

document.querySelectorAll('#setup-username, #setup-password, #setup-password-confirm').forEach(el => {
  el.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('setup-btn').click(); });
});
</script>
</body>
</html>
